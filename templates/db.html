<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB ビューア — 財務分析ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.header{background:#1a1d2e;border-bottom:1px solid #2d3154;padding:14px 24px;display:flex;align-items:center;gap:14px}
.header h1{font-size:17px;font-weight:600;color:#a78bfa}
.header a{color:#94a3b8;text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid #334155}
.header a:hover{background:#1e293b;color:#e2e8f0}
.badge{background:#312e81;color:#c4b5fd;font-size:11px;padding:3px 8px;border-radius:12px}
.container{padding:24px;max-width:1400px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.section{margin-bottom:32px}

/* テーブル一覧カード */
.tables-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tbl-card{background:#1a1d2e;border:1px solid #2d3154;border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.tbl-card:hover{border-color:#7c3aed;background:#1e1b3a}
.tbl-card.active{border-color:#a78bfa;background:#2e1065}
.tbl-card-name{font-size:13px;font-weight:600;color:#e2e8f0;margin-bottom:8px;font-family:'Consolas','Menlo',monospace}
.tbl-card-meta{display:flex;justify-content:space-between;font-size:11px;color:#64748b}
.tbl-card-rows{font-size:20px;font-weight:700;color:#a78bfa;margin:4px 0}

/* リレーション図 */
.relations-box{background:#1a1d2e;border:1px solid #2d3154;border-radius:10px;padding:24px;overflow-x:auto}
.er-canvas{display:flex;justify-content:space-around;align-items:center;min-width:900px;gap:32px;position:relative}
.er-entity{background:#0f1117;border:1px solid #334155;border-radius:8px;padding:14px;min-width:200px;z-index:2}
.er-entity-name{font-size:13px;font-weight:600;color:#a78bfa;font-family:'Consolas',monospace;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2d3154}
.er-entity-col{font-size:11px;color:#94a3b8;font-family:'Consolas',monospace;padding:2px 0}
.er-entity-col.pk{color:#fcd34d}
.er-entity-col.fk{color:#86efac}
.er-relations-list{margin-top:16px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:#94a3b8}
.er-relation-row{font-family:'Consolas',monospace;padding:6px 10px;background:#0f1117;border-radius:6px;border-left:3px solid #7c3aed}

/* タブ */
.tabs{display:flex;gap:2px;background:#0f1117;padding:4px;border-radius:8px;margin-bottom:16px;width:fit-content}
.tab-btn{background:transparent;border:none;color:#64748b;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.tab-btn.active{background:#2e1065;color:#c4b5fd}
.tab-content{display:none}
.tab-content.active{display:block}

/* テーブル詳細 */
.detail-box{background:#1a1d2e;border:1px solid #2d3154;border-radius:10px;padding:20px}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.detail-title{font-size:15px;font-weight:600;color:#a78bfa;font-family:'Consolas',monospace}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;background:#7c3aed;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#6d28d9}
.btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}
.btn-outline:hover{background:#1e293b;color:#e2e8f0}
.btn-sm{padding:4px 10px;font-size:11px}

/* データテーブル */
.data-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Consolas',monospace}
.data-table th{background:#0f1117;color:#94a3b8;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid #2d3154;white-space:nowrap;position:sticky;top:0;cursor:pointer;user-select:none}
.data-table th:hover{background:#1e293b;color:#e2e8f0}
.data-table th.sort-asc::after{content:' ▲';color:#a78bfa}
.data-table th.sort-desc::after{content:' ▼';color:#a78bfa}
.data-table td{padding:6px 10px;border-bottom:1px solid #1e293b;color:#cbd5e1;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table td.null-cell{color:#475569;font-style:italic}
.data-table tr:hover td{background:#0f1117}
.table-wrap{overflow-x:auto;max-height:600px;border:1px solid #2d3154;border-radius:6px}

/* スキーマテーブル */
.schema-table{width:100%;border-collapse:collapse;font-size:12px}
.schema-table th{background:#0f1117;color:#94a3b8;padding:8px 12px;text-align:left;font-weight:600;border-bottom:1px solid #2d3154;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.schema-table td{padding:8px 12px;border-bottom:1px solid #1e293b;font-family:'Consolas',monospace;font-size:12px}
.schema-table .col-name{color:#e2e8f0;font-weight:600}
.schema-table .col-type{color:#93c5fd}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;font-family:'Segoe UI',sans-serif}
.tag-pk{background:#451a03;color:#fcd34d}
.tag-fk{background:#052e16;color:#86efac}
.tag-null{background:#1e293b;color:#64748b}
.null-bar{display:inline-block;height:6px;background:#1e293b;border-radius:3px;overflow:hidden;vertical-align:middle;width:80px;margin-right:6px}
.null-bar-fill{height:100%;background:#ef4444}

/* 統計サマリー */
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{background:#0f1117;color:#94a3b8;padding:8px 12px;text-align:left;font-weight:600;border-bottom:1px solid #2d3154;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.stats-table td{padding:8px 12px;border-bottom:1px solid #1e293b;font-family:'Consolas',monospace;font-size:12px;color:#cbd5e1;text-align:right}
.stats-table td.col-name-cell{text-align:left;color:#e2e8f0;font-weight:600}
.stats-table td.text-type{color:#64748b;text-align:center;font-style:italic}

/* ページネーション・コントロール */
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.controls-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.input,.select{background:#0f1117;border:1px solid #334155;color:#e2e8f0;padding:6px 10px;border-radius:5px;font-size:12px;font-family:'Consolas',monospace}
.input:focus,.select:focus{outline:none;border-color:#7c3aed}
.page-info{font-size:12px;color:#64748b}

/* 企業ドリルダウン */
.drilldown-box{background:#1a1d2e;border:1px solid #2d3154;border-radius:10px;padding:20px}
.drilldown-form{display:flex;gap:8px;margin-bottom:16px}
.drilldown-section{margin-top:20px;padding-top:16px;border-top:1px solid #2d3154}
.drilldown-section h3{font-size:13px;color:#a78bfa;margin-bottom:10px;font-family:'Consolas',monospace}
.kv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 14px;font-size:12px;font-family:'Consolas',monospace}
.kv-row{display:flex;justify-content:space-between;padding:4px 8px;background:#0f1117;border-radius:4px}
.kv-key{color:#64748b}
.kv-val{color:#cbd5e1}

.empty-msg{padding:32px;text-align:center;color:#64748b;font-size:13px}
.loading{padding:24px;text-align:center;color:#64748b;font-size:12px}
.error{padding:12px;background:#450a0a;color:#fca5a5;border-radius:6px;font-size:12px;margin:8px 0}
</style>
</head>
<body>

<div class="header">
  <div style="width:32px;height:32px;background:#312e81;border-radius:8px;display:flex;align-items:center;justify-content:center">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
    </svg>
  </div>
  <h1>DB ビューア</h1>
  <span class="badge">データベース</span>
  <div style="margin-left:auto;display:flex;gap:8px">
    <a href="/">← ホーム</a>
    <a href="/collection">収集</a>
    <a href="/analysis">分析</a>
  </div>
</div>

<div class="container">

  <!-- テーブル一覧 -->
  <div class="section">
    <div class="section-title">テーブル一覧</div>
    <div class="tables-grid" id="tables-grid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <!-- リレーション図 -->
  <div class="section">
    <div class="section-title">テーブル間リレーション</div>
    <div class="relations-box" id="relations-box">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <!-- テーブル詳細（スキーマ・プレビュー・統計） -->
  <div class="section" id="detail-section" style="display:none">
    <div class="section-title" id="detail-section-title">テーブル詳細</div>
    <div class="detail-box">
      <div class="detail-header">
        <div class="detail-title" id="detail-title">—</div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="preview">プレビュー</button>
          <button class="tab-btn" data-tab="schema">スキーマ</button>
          <button class="tab-btn" data-tab="stats">統計サマリー</button>
        </div>
      </div>

      <!-- プレビュータブ -->
      <div class="tab-content active" id="tab-preview">
        <div class="controls">
          <div class="controls-group">
            <span style="font-size:12px;color:#64748b">フィルタ:</span>
            <select class="select" id="filter-col">
              <option value="">（なし）</option>
            </select>
            <input class="input" id="filter-val" placeholder="値" style="width:160px">
            <button class="btn btn-outline btn-sm" id="apply-filter">適用</button>
            <button class="btn btn-outline btn-sm" id="clear-filter">クリア</button>
          </div>
          <div class="controls-group">
            <span class="page-info" id="page-info">—</span>
            <button class="btn btn-outline btn-sm" id="prev-page">← 前</button>
            <button class="btn btn-outline btn-sm" id="next-page">次 →</button>
            <button class="btn btn-sm" id="download-csv">CSV ダウンロード</button>
          </div>
        </div>
        <div class="table-wrap" id="preview-wrap">
          <div class="loading">テーブルを選択してください</div>
        </div>
      </div>

      <!-- スキーマタブ -->
      <div class="tab-content" id="tab-schema">
        <div id="schema-content"><div class="loading">読み込み中...</div></div>
      </div>

      <!-- 統計サマリータブ -->
      <div class="tab-content" id="tab-stats">
        <div id="stats-content"><div class="loading">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- 企業ドリルダウン -->
  <div class="section">
    <div class="section-title">企業別ドリルダウン</div>
    <div class="drilldown-box">
      <div class="drilldown-form">
        <input class="input" id="drill-code" placeholder="EDINETコード（例: E00001 → E000001）" style="flex:1;max-width:300px">
        <button class="btn" id="drill-btn">横断検索</button>
      </div>
      <div id="drill-result"></div>
    </div>
  </div>

</div>

<script>
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmt(v){
  if(v===null||v===undefined) return '<span class="null-cell">NULL</span>';
  if(typeof v==='number'){
    if(Number.isInteger(v)) return v.toLocaleString();
    return v.toLocaleString(undefined,{maximumFractionDigits:4});
  }
  return esc(v);
}
function apiBase(){ return ''; }

async function apiFetch(path){
  const token = localStorage.getItem('auth_token') || '';
  const heads = {'Content-Type':'application/json'};
  if(token) heads['Authorization'] = 'Bearer ' + token;
  const r = await fetch(apiBase()+path, {headers: heads});
  if(r.status===401){ location.href='/login?next=/db'; return null; }
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── 状態 ─────────────────────────────────────────────────────────────
const state = {
  selectedTable: null,
  limit:  50,
  offset: 0,
  sort:   null,
  order:  'desc',
  filterCol: null,
  filterVal: null,
  total: 0,
};

// ── テーブル一覧 ─────────────────────────────────────────────────────
async function loadTables(){
  try{
    const d = await apiFetch('/api/db/tables');
    if(!d) return;
    const grid = document.getElementById('tables-grid');
    grid.innerHTML = '';
    d.tables.forEach(t => {
      const card = document.createElement('div');
      card.className = 'tbl-card';
      card.dataset.name = t.name;
      card.innerHTML = `
        <div class="tbl-card-name">${esc(t.name)}</div>
        <div class="tbl-card-rows">${t.row_count.toLocaleString()}</div>
        <div class="tbl-card-meta">
          <span>${t.column_count} カラム</span>
          <span>${t.last_updated ? t.last_updated.substring(5,16) : '—'}</span>
        </div>
      `;
      card.onclick = () => selectTable(t.name);
      grid.appendChild(card);
    });
  }catch(e){
    document.getElementById('tables-grid').innerHTML = `<div class="error">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

// ── リレーション図 ───────────────────────────────────────────────────
async function loadRelations(){
  try{
    const d = await apiFetch('/api/db/relations');
    if(!d) return;
    const box = document.getElementById('relations-box');

    // companies を中央、左に financial_records、右に stock_price_history、下に collection_logs（独立）
    const tablesByName = Object.fromEntries(d.tables.map(t => [t.name, t]));

    const layout = `
      <div class="er-canvas">
        ${renderEntity(tablesByName.financial_records)}
        ${renderEntity(tablesByName.companies, true)}
        ${renderEntity(tablesByName.stock_price_history)}
      </div>
      <div style="margin-top:24px">
        ${renderEntity(tablesByName.collection_logs, false, true)}
      </div>
      <div class="er-relations-list">
        ${d.relations.map(r => `
          <div class="er-relation-row">
            <strong style="color:#86efac">${esc(r.from_table)}.${esc(r.from_column)}</strong>
            → <strong style="color:#fcd34d">${esc(r.to_table)}.${esc(r.to_column)}</strong>
            <span style="color:#64748b;margin-left:8px">[${esc(r.label)}]</span>
          </div>
        `).join('')}
        <div style="color:#64748b;font-size:11px;margin-top:6px;padding-left:10px">
          ※ collection_logs は他テーブルと直接リレーションを持たない独立テーブル
        </div>
      </div>
    `;
    box.innerHTML = layout;
  }catch(e){
    document.getElementById('relations-box').innerHTML = `<div class="error">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

function renderEntity(t, highlight, full){
  if(!t) return '';
  const shownCols = full ? t.columns : t.columns.slice(0, 8);
  const more = t.columns.length - shownCols.length;
  const pkSet = new Set(t.pk);
  return `
    <div class="er-entity" style="${highlight?'border-color:#a78bfa;background:#1e1b3a':''}">
      <div class="er-entity-name">${esc(t.name)}</div>
      ${shownCols.map(c => `
        <div class="er-entity-col ${pkSet.has(c)?'pk':(c==='edinet_code'?'fk':'')}">
          ${pkSet.has(c)?'🔑 ':''}${c==='edinet_code'&&!pkSet.has(c)?'🔗 ':''}${esc(c)}
        </div>
      `).join('')}
      ${more > 0 ? `<div class="er-entity-col" style="color:#475569">... 他 ${more} カラム</div>` : ''}
    </div>
  `;
}

// ── テーブル選択 ─────────────────────────────────────────────────────
function selectTable(name){
  state.selectedTable = name;
  state.offset = 0;
  state.sort = null;
  state.filterCol = null;
  state.filterVal = null;
  document.querySelectorAll('.tbl-card').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name);
  });
  document.getElementById('detail-section').style.display = 'block';
  document.getElementById('detail-title').textContent = name;
  document.getElementById('filter-val').value = '';
  loadSchema(name).then(() => loadPreview());
  loadStats(name);
}

// ── スキーマ ────────────────────────────────────────────────────────
async function loadSchema(name){
  const el = document.getElementById('schema-content');
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  try{
    const d = await apiFetch(`/api/db/schema/${name}`);
    if(!d) return;
    // フィルタカラム候補を更新（PK・FK・主要キーのみに絞る）
    const fc = document.getElementById('filter-col');
    fc.innerHTML = '<option value="">（なし）</option>';
    d.columns.forEach(c => {
      if(c.pk || c.fk || ['edinet_code','sec_code','year','status','job_type','trade_date','industry','market'].includes(c.name)){
        fc.innerHTML += `<option value="${esc(c.name)}">${esc(c.name)}</option>`;
      }
    });

    el.innerHTML = `
      <div style="margin-bottom:10px;font-size:12px;color:#64748b">
        全 ${d.row_count.toLocaleString()} 行 / ${d.columns.length} カラム
      </div>
      <div style="overflow-x:auto">
      <table class="schema-table">
        <thead>
          <tr>
            <th>カラム名</th>
            <th>型</th>
            <th>制約</th>
            <th style="text-align:right">NULL率</th>
          </tr>
        </thead>
        <tbody>
          ${d.columns.map(c => `
            <tr>
              <td class="col-name">${esc(c.name)}</td>
              <td class="col-type">${esc(c.type)}</td>
              <td>
                ${c.pk ? '<span class="tag tag-pk">PK</span> ' : ''}
                ${c.fk ? `<span class="tag tag-fk">FK→${esc(c.fk)}</span> ` : ''}
                ${c.nullable ? '<span class="tag tag-null">NULLABLE</span>' : '<span class="tag tag-pk">NOT NULL</span>'}
              </td>
              <td style="text-align:right">
                ${c.null_rate === null ? '—' : `
                  <span class="null-bar"><span class="null-bar-fill" style="width:${c.null_rate}%"></span></span>
                  ${c.null_rate.toFixed(1)}%
                `}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>
    `;
  }catch(e){
    el.innerHTML = `<div class="error">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

// ── プレビュー ──────────────────────────────────────────────────────
async function loadPreview(){
  const wrap = document.getElementById('preview-wrap');
  if(!state.selectedTable){ wrap.innerHTML = '<div class="loading">テーブルを選択してください</div>'; return; }
  wrap.innerHTML = '<div class="loading">読み込み中...</div>';
  try{
    const qs = new URLSearchParams({
      limit:  state.limit,
      offset: state.offset,
      order:  state.order,
    });
    if(state.sort) qs.set('sort', state.sort);
    if(state.filterCol && state.filterVal){
      qs.set('filter_col', state.filterCol);
      qs.set('filter_val', state.filterVal);
    }
    const d = await apiFetch(`/api/db/preview/${state.selectedTable}?${qs}`);
    if(!d) return;
    state.total = d.total;
    document.getElementById('page-info').textContent =
      `${state.offset+1}-${Math.min(state.offset+state.limit, d.total)} / ${d.total.toLocaleString()} 行`;
    document.getElementById('prev-page').disabled = state.offset === 0;
    document.getElementById('next-page').disabled = state.offset + state.limit >= d.total;

    if(d.rows.length === 0){
      wrap.innerHTML = '<div class="empty-msg">該当データなし</div>';
      return;
    }
    wrap.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>${d.columns.map(c => {
            const cls = state.sort === c ? (state.order==='desc'?'sort-desc':'sort-asc') : '';
            return `<th class="${cls}" data-col="${esc(c)}">${esc(c)}</th>`;
          }).join('')}</tr>
        </thead>
        <tbody>
          ${d.rows.map(r => `
            <tr>${d.columns.map(c => {
              const v = r[c];
              const isNull = v===null || v===undefined;
              return `<td class="${isNull?'null-cell':''}" title="${esc(v)}">${fmt(v)}</td>`;
            }).join('')}</tr>
          `).join('')}
        </tbody>
      </table>
    `;
    // ソート操作
    wrap.querySelectorAll('th').forEach(th => {
      th.onclick = () => {
        const col = th.dataset.col;
        if(state.sort === col){
          state.order = state.order === 'desc' ? 'asc' : 'desc';
        }else{
          state.sort  = col;
          state.order = 'desc';
        }
        state.offset = 0;
        loadPreview();
      };
    });
  }catch(e){
    wrap.innerHTML = `<div class="error">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

// ── 統計サマリー ─────────────────────────────────────────────────────
async function loadStats(name){
  const el = document.getElementById('stats-content');
  el.innerHTML = '<div class="loading">読み込み中...</div>';
  try{
    const d = await apiFetch(`/api/db/stats/${name}`);
    if(!d) return;
    el.innerHTML = `
      <div style="margin-bottom:10px;font-size:12px;color:#64748b">
        全 ${d.row_count.toLocaleString()} 行を対象に集計
      </div>
      <div style="overflow-x:auto">
      <table class="stats-table">
        <thead>
          <tr>
            <th style="text-align:left">カラム</th>
            <th style="text-align:left">型</th>
            <th>件数 / 異なり値</th>
            <th>MIN</th>
            <th>AVG</th>
            <th>P50</th>
            <th>P99</th>
            <th>MAX</th>
          </tr>
        </thead>
        <tbody>
          ${d.stats.map(s => {
            if(!s.numeric){
              return `
                <tr>
                  <td class="col-name-cell">${esc(s.name)}</td>
                  <td style="text-align:left;color:#93c5fd">${esc(s.type)}</td>
                  <td>${s.distinct!==undefined && s.distinct!==null ? s.distinct.toLocaleString()+' uniq' : '—'}</td>
                  <td class="text-type" colspan="5">（非数値カラム）</td>
                </tr>
              `;
            }
            return `
              <tr>
                <td class="col-name-cell">${esc(s.name)}</td>
                <td style="text-align:left;color:#93c5fd">${esc(s.type)}</td>
                <td>${s.count!==undefined ? s.count.toLocaleString() : '—'}</td>
                <td>${s.min!==undefined && s.min!==null ? fmt(s.min) : '—'}</td>
                <td>${s.avg!==undefined && s.avg!==null ? fmt(s.avg) : '—'}</td>
                <td>${s.p50!==undefined && s.p50!==null ? fmt(s.p50) : '—'}</td>
                <td>${s.p99!==undefined && s.p99!==null ? fmt(s.p99) : '—'}</td>
                <td>${s.max!==undefined && s.max!==null ? fmt(s.max) : '—'}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
      </div>
    `;
  }catch(e){
    el.innerHTML = `<div class="error">読み込み失敗: ${esc(e.message)}</div>`;
  }
}

// ── 企業ドリルダウン ─────────────────────────────────────────────────
async function runDrilldown(){
  const code = document.getElementById('drill-code').value.trim();
  const res  = document.getElementById('drill-result');
  if(!/^E\d{6}$/.test(code)){
    res.innerHTML = '<div class="error">EDINETコードは E + 6桁数字（例: E000001）の形式で入力してください</div>';
    return;
  }
  res.innerHTML = '<div class="loading">読み込み中...</div>';
  try{
    const d = await apiFetch(`/api/db/company/${code}`);
    if(!d) return;
    const co = d.company;
    res.innerHTML = `
      <div class="drilldown-section">
        <h3>📋 companies</h3>
        <div class="kv-grid">
          ${['edinet_code','sec_code','name','industry','market','fiscal_month','accounting_standard','updated_at']
            .map(k => `<div class="kv-row"><span class="kv-key">${esc(k)}</span><span class="kv-val">${fmt(co[k])}</span></div>`)
            .join('')}
        </div>
      </div>
      <div class="drilldown-section">
        <h3>📊 financial_records (${d.financial_records.length} 件)</h3>
        ${d.financial_records.length === 0 ? '<div class="empty-msg">財務レコードなし</div>' : `
          <div class="table-wrap" style="max-height:300px">
            <table class="data-table">
              <thead><tr>
                <th>year</th><th>period_end</th>
                <th>pl_revenue</th><th>pl_operating_profit</th><th>pl_net_income</th>
                <th>bs_total_assets</th><th>bs_total_equity</th>
                <th>market_cap</th><th>per</th><th>pbr</th><th>roe</th>
              </tr></thead>
              <tbody>
                ${d.financial_records.map(r => `
                  <tr>
                    <td>${fmt(r.year)}</td><td>${fmt(r.period_end)}</td>
                    <td>${fmt(r.pl_revenue)}</td><td>${fmt(r.pl_operating_profit)}</td><td>${fmt(r.pl_net_income)}</td>
                    <td>${fmt(r.bs_total_assets)}</td><td>${fmt(r.bs_total_equity)}</td>
                    <td>${fmt(r.market_cap)}</td><td>${fmt(r.per)}</td><td>${fmt(r.pbr)}</td><td>${fmt(r.roe)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
      <div class="drilldown-section">
        <h3>📈 stock_price_history (${d.stock_price_history.total.toLocaleString()} 件 / ${d.stock_price_history.oldest_date ?? '—'} 〜 ${d.stock_price_history.newest_date ?? '—'})</h3>
        ${d.stock_price_history.recent.length === 0 ? '<div class="empty-msg">株価履歴なし</div>' : `
          <div class="table-wrap" style="max-height:240px">
            <table class="data-table">
              <thead><tr><th>trade_date</th><th>open</th><th>high</th><th>low</th><th>close</th><th>volume</th></tr></thead>
              <tbody>
                ${d.stock_price_history.recent.map(r => `
                  <tr>
                    <td>${fmt(r.trade_date)}</td>
                    <td>${fmt(r.open)}</td><td>${fmt(r.high)}</td><td>${fmt(r.low)}</td>
                    <td>${fmt(r.close)}</td><td>${fmt(r.volume)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    `;
  }catch(e){
    res.innerHTML = `<div class="error">${esc(e.message) || '取得失敗'}</div>`;
  }
}

// ── イベントバインド ────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  };
});

document.getElementById('prev-page').onclick = () => {
  state.offset = Math.max(0, state.offset - state.limit);
  loadPreview();
};
document.getElementById('next-page').onclick = () => {
  state.offset += state.limit;
  loadPreview();
};
document.getElementById('apply-filter').onclick = () => {
  state.filterCol = document.getElementById('filter-col').value || null;
  state.filterVal = document.getElementById('filter-val').value.trim() || null;
  state.offset = 0;
  loadPreview();
};
document.getElementById('clear-filter').onclick = () => {
  document.getElementById('filter-col').value = '';
  document.getElementById('filter-val').value = '';
  state.filterCol = null;
  state.filterVal = null;
  state.offset = 0;
  loadPreview();
};
document.getElementById('download-csv').onclick = () => {
  if(!state.selectedTable) return;
  const qs = new URLSearchParams({limit: 10000});
  if(state.filterCol && state.filterVal){
    qs.set('filter_col', state.filterCol);
    qs.set('filter_val', state.filterVal);
  }
  const token = localStorage.getItem('auth_token') || '';
  // 認証ヘッダ付きで CSV をフェッチして blob 化（直接 location は Authorization を付与できないため）
  fetch(`/api/db/export/${state.selectedTable}?${qs}`, {
    headers: token ? {'Authorization': 'Bearer ' + token} : {}
  }).then(r => r.blob()).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${state.selectedTable}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });
};
document.getElementById('drill-btn').onclick = runDrilldown;
document.getElementById('drill-code').addEventListener('keypress', e => {
  if(e.key === 'Enter') runDrilldown();
});

// ── 認証チェック → 起動 ─────────────────────────────────────────────
async function initAuth(){
  try{
    const r = await fetch('/api/auth/status');
    const d = await r.json();
    if(d.auth_required && !localStorage.getItem('auth_token')){
      location.href = '/login?next=/db';
    }
  }catch(e){}
}

(async () => {
  await initAuth();
  loadTables();
  loadRelations();
})();
</script>
