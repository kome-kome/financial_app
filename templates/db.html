<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB ビューア — 財務分析ツール</title>
<script src="/static/js/theme-init.js"></script>
<style>
:root{
  --bg:#0f1117;--bg-elevated:#1a1d2e;--bg-sunken:#0f1117;--bg-hover:#1e293b;
  --border:#2d3154;--border-muted:#334155;--border-subtle:#1e2235;
  --text:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;--text-body:#cbd5e1;
  --accent:#7c3aed;--accent-hover:#6d28d9;--accent-text:#a78bfa;
  --accent-soft-bg:#312e81;--accent-soft-text:#c4b5fd;--accent-deep-bg:#2e1065;
  --status-good:#10b981;--status-good-bg:#052e16;--status-good-text:#86efac;
  --status-bad:#ef4444;--status-bad-bg:#450a0a;--status-bad-text:#fca5a5;
  --status-warn:#f59e0b;--status-warn-bg:#451a03;--status-warn-text:#fcd34d;
  --status-info:#60a5fa;--status-info-bg:#1e3a5f;--status-info-text:#93c5fd;
  --val-up:#3b82f6;--val-up-bg:#1e3a5f;--val-up-text:#93c5fd;
  --val-down:#ef4444;--val-down-bg:#450a0a;--val-down-text:#fca5a5;
  --val-neutral:#10b981;--val-neutral-bg:#052e16;--val-neutral-text:#86efac;
  --shadow-color:rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f8fafc;--bg-elevated:#ffffff;--bg-sunken:#f1f5f9;--bg-hover:#e2e8f0;
  --border:#e2e8f0;--border-muted:#cbd5e1;--border-subtle:#e5e7eb;
  --text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--text-body:#334155;
  --accent:#7c3aed;--accent-hover:#6d28d9;--accent-text:#6d28d9;
  --accent-soft-bg:#ede9fe;--accent-soft-text:#6d28d9;--accent-deep-bg:#ddd6fe;
  --status-good:#059669;--status-good-bg:#d1fae5;--status-good-text:#065f46;
  --status-bad:#dc2626;--status-bad-bg:#fee2e2;--status-bad-text:#991b1b;
  --status-warn:#d97706;--status-warn-bg:#fef3c7;--status-warn-text:#92400e;
  --status-info:#2563eb;--status-info-bg:#dbeafe;--status-info-text:#1e40af;
  --val-up:#2563eb;--val-up-bg:#dbeafe;--val-up-text:#1e40af;
  --val-down:#dc2626;--val-down-bg:#fee2e2;--val-down-text:#991b1b;
  --val-neutral:#059669;--val-neutral-bg:#d1fae5;--val-neutral-text:#065f46;
  --shadow-color:rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--bg-elevated);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:14px}
.header h1{font-size:17px;font-weight:600;color:var(--accent-text)}
.header a{color:var(--text-secondary);text-decoration:none;font-size:13px;padding:5px 12px;border-radius:6px;border:1px solid var(--border-muted)}
.header a:hover{background:var(--bg-hover);color:var(--text)}
.badge{background:var(--accent-soft-bg);color:var(--accent-soft-text);font-size:11px;padding:3px 8px;border-radius:12px}
.theme-toggle-btn{background:transparent;border:1px solid var(--border-muted);color:var(--text);border-radius:6px;width:30px;height:30px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.theme-toggle-btn:hover{background:var(--bg-hover)}
.container{padding:24px;max-width:1400px;margin:0 auto}
.section-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.section{margin-bottom:32px}

/* テーブル一覧カード */
.tables-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tbl-card{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s}
.tbl-card:hover{border-color:var(--accent);background:var(--accent-soft-bg)}
.tbl-card.active{border-color:var(--accent-text);background:var(--accent-deep-bg)}
.tbl-card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;font-family:'Consolas','Menlo',monospace}
.tbl-card-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted)}
.tbl-card-rows{font-size:20px;font-weight:700;color:var(--accent-text);margin:4px 0}

/* リレーション図 */
.relations-box{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:24px;overflow-x:auto}
.er-canvas{display:flex;justify-content:space-around;align-items:center;min-width:900px;gap:32px;position:relative}
.er-entity{background:var(--bg-sunken);border:1px solid var(--border-muted);border-radius:8px;padding:14px;min-width:200px;z-index:2}
.er-entity-name{font-size:13px;font-weight:600;color:var(--accent-text);font-family:'Consolas',monospace;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.er-entity-col{font-size:11px;color:var(--text-secondary);font-family:'Consolas',monospace;padding:2px 0}
.er-entity-col.pk{color:var(--status-warn-text)}
.er-entity-col.fk{color:var(--status-good-text)}
.er-relations-list{margin-top:16px;display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--text-secondary)}
.er-relation-row{font-family:'Consolas',monospace;padding:6px 10px;background:var(--bg-sunken);border-radius:6px;border-left:3px solid var(--accent)}

/* タブ */
.tabs{display:flex;gap:2px;background:var(--bg-sunken);padding:4px;border-radius:8px;margin-bottom:16px;width:fit-content}
.tab-btn{background:transparent;border:none;color:var(--text-muted);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.tab-btn.active{background:var(--accent-deep-bg);color:var(--accent-soft-text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* テーブル詳細 */
.detail-box{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:20px}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.detail-title{font-size:15px;font-weight:600;color:var(--accent-text);font-family:'Consolas',monospace}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--accent-hover)}
.btn-outline{background:transparent;border:1px solid var(--border-muted);color:var(--text-secondary)}
.btn-outline:hover{background:var(--bg-hover);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:11px}

/* データテーブル */
.data-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Consolas','Menlo',monospace}
.data-table th{background:var(--bg-sunken);color:var(--text-secondary);padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;cursor:pointer;user-select:none}
.data-table th:hover{background:var(--bg-hover);color:var(--text)}
.data-table th.sort-asc::after{content:' ▲';color:var(--accent-text)}
.data-table th.sort-desc::after{content:' ▼';color:var(--accent-text)}
.data-table td{padding:6px 10px;border-bottom:1px solid var(--bg-hover);color:var(--text-body);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table td.null-cell{color:var(--text-muted);font-style:italic}
.data-table tr:hover td{background:var(--bg-sunken)}
.table-wrap{overflow-x:auto;max-height:600px;border:1px solid var(--border);border-radius:6px}

/* スキーマテーブル */
.schema-table{width:100%;border-collapse:collapse;font-size:12px}
.schema-table th{background:var(--bg-sunken);color:var(--text-secondary);padding:8px 12px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.schema-table td{padding:8px 12px;border-bottom:1px solid var(--bg-hover);font-family:'Consolas',monospace;font-size:12px}
.schema-table .col-name{color:var(--text);font-weight:600}
.schema-table .col-type{color:var(--status-info-text)}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:500;font-family:'Segoe UI',sans-serif}
.tag-pk{background:var(--status-warn-bg);color:var(--status-warn-text)}
.tag-fk{background:var(--status-good-bg);color:var(--status-good-text)}
.tag-null{background:var(--bg-hover);color:var(--text-muted)}
.null-bar{display:inline-block;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden;vertical-align:middle;width:80px;margin-right:6px}
.null-bar-fill{height:100%;background:var(--status-bad)}

/* 統計サマリー */
.stats-table{width:100%;border-collapse:collapse;font-size:12px}
.stats-table th{background:var(--bg-sunken);color:var(--text-secondary);padding:8px 12px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.stats-table td{padding:8px 12px;border-bottom:1px solid var(--bg-hover);font-family:'Consolas',monospace;font-size:12px;color:var(--text-body);text-align:right}
.stats-table td.col-name-cell{text-align:left;color:var(--text);font-weight:600}
.stats-table td.text-type{color:var(--text-muted);text-align:center;font-style:italic}

/* ページネーション・コントロール */
.controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px}
.controls-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.input,.select{background:var(--bg-sunken);border:1px solid var(--border-muted);color:var(--text);padding:6px 10px;border-radius:5px;font-size:12px;font-family:'Consolas',monospace}
.input:focus,.select:focus{outline:none;border-color:var(--accent)}
.page-info{font-size:12px;color:var(--text-muted)}

/* 企業ドリルダウン */
.drilldown-box{background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;padding:20px}
.drilldown-form{display:flex;gap:8px;margin-bottom:16px}
.drilldown-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.drilldown-section h3{font-size:13px;color:var(--accent-text);margin-bottom:10px;font-family:'Consolas',monospace}
.kv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 14px;font-size:12px;font-family:'Consolas',monospace}
.kv-row{display:flex;justify-content:space-between;padding:4px 8px;background:var(--bg-sunken);border-radius:4px}
.kv-key{color:var(--text-muted)}
.kv-val{color:var(--text-body)}

.empty-msg{padding:32px;text-align:center;color:var(--text-muted);font-size:13px}
.loading{padding:24px;text-align:center;color:var(--text-muted);font-size:12px}
.error{padding:12px;background:var(--status-bad-bg);color:var(--status-bad-text);border-radius:6px;font-size:12px;margin:8px 0}
.co-link{color:var(--accent-text);text-decoration:none}
.co-link:hover{text-decoration:underline}
.gnav{display:flex;align-items:center;gap:2px;background:var(--bg-elevated);border-bottom:1px solid var(--border);padding:0 24px;flex-wrap:wrap}
.gnav-link{padding:10px 14px;font-size:13px;color:var(--text-secondary);text-decoration:none;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.gnav-link:hover{color:var(--text)}
.gnav-link.active{color:var(--text);border-bottom-color:var(--accent)}
.gnav-ref{color:var(--text-muted)}
.gnav-spacer{margin-left:auto}
</style>
</head>
<body>

<div class="header">
  <div style="width:32px;height:32px;background:var(--accent-soft-bg);border-radius:8px;display:flex;align-items:center;justify-content:center">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-text)" stroke-width="2">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>
    </svg>
  </div>
  <h1>DB ビューア</h1>
  <span class="badge">データベース</span>
  <button id="theme-toggle" class="theme-toggle-btn" title="ライト/ダーク切替" aria-label="テーマ切替">🌙</button>
</div>

<nav class="gnav">
  <a href="/" class="gnav-link">ホーム</a>
  <a href="/analysis" class="gnav-link">分析</a>
  <a href="/company" class="gnav-link">企業詳細</a>
  <a href="/collection" class="gnav-link">収集</a>
  <span class="gnav-spacer"></span>
  <a href="/guide" class="gnav-link gnav-ref" style="color:var(--val-up)">やさしい解説</a>
  <a href="/models" class="gnav-link gnav-ref" style="color:var(--accent-text)">モデル解説</a>
</nav>

<div class="container">

  <!-- テーブル一覧 -->
  <div class="section">
    <div class="section-title">テーブル一覧</div>
    <div class="tables-grid" id="tables-grid">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <!-- リレーション図 -->
  <div class="section">
    <div class="section-title">テーブル間リレーション</div>
    <div class="relations-box" id="relations-box">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <!-- テーブル詳細（スキーマ・プレビュー・統計） -->
  <div class="section" id="detail-section" style="display:none">
    <div class="section-title" id="detail-section-title">テーブル詳細</div>
    <div class="detail-box">
      <div class="detail-header">
        <div class="detail-title" id="detail-title">—</div>
        <div class="tabs">
          <button class="tab-btn active" data-tab="preview">プレビュー</button>
          <button class="tab-btn" data-tab="schema">スキーマ</button>
          <button class="tab-btn" data-tab="stats">統計サマリー</button>
        </div>
      </div>

      <!-- プレビュータブ -->
      <div class="tab-content active" id="tab-preview">
        <div class="controls">
          <div class="controls-group">
            <span style="font-size:12px;color:var(--text-muted)">フィルタ:</span>
            <select class="select" id="filter-col">
              <option value="">（なし）</option>
            </select>
            <input class="input" id="filter-val" placeholder="値" style="width:160px">
            <button class="btn btn-outline btn-sm" id="apply-filter">適用</button>
            <button class="btn btn-outline btn-sm" id="clear-filter">クリア</button>
          </div>
          <div class="controls-group">
            <span class="page-info" id="page-info">—</span>
            <button class="btn btn-outline btn-sm" id="prev-page">← 前</button>
            <button class="btn btn-outline btn-sm" id="next-page">次 →</button>
            <button class="btn btn-sm" id="download-csv">CSV ダウンロード</button>
          </div>
        </div>
        <div class="table-wrap" id="preview-wrap">
          <div class="loading">テーブルを選択してください</div>
        </div>
      </div>

      <!-- スキーマタブ -->
      <div class="tab-content" id="tab-schema">
        <div id="schema-content"><div class="loading">読み込み中...</div></div>
      </div>

      <!-- 統計サマリータブ -->
      <div class="tab-content" id="tab-stats">
        <div id="stats-content"><div class="loading">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- 企業ドリルダウン -->
  <div class="section">
    <div class="section-title">企業別ドリルダウン</div>
    <div class="drilldown-box">
      <div class="drilldown-form">
        <input class="input" id="drill-code" placeholder="EDINETコード（例: E00001 → E000001）" style="flex:1;max-width:300px">
        <button class="btn" id="drill-btn">横断検索</button>
      </div>
      <div id="drill-result"></div>
    </div>
  </div>

</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/db.js"></script>

</body>
</html>
