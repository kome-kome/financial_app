<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — 財務分析ツール</title>
<link rel="stylesheet" href="/static/css/app.css?v=20260529">
<style>
/* login 固有：センター配置のカード */
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { width: 380px; padding: var(--sp-6); }
.login-card .brand-row { display: flex; align-items: center; gap: var(--sp-3); margin-bottom: var(--sp-5); }
.login-card .brand-row svg { width: 28px; height: 28px; color: var(--accent); }
.login-card h1 { font-size: var(--fs-lg); color: var(--text-primary); }
.login-card .sub { font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px; }
.login-card label { display: block; font-size: var(--fs-sm); color: var(--text-secondary); margin: var(--sp-3) 0 6px; }
.login-card input[type=password] { width: 100%; padding: 10px 12px; font-size: var(--fs-md); }
.login-card .btn-primary, .login-card .btn-secondary { width: 100%; justify-content: center; margin-top: var(--sp-3); padding: 11px; }
.login-card .err { color: var(--danger);  font-size: var(--fs-sm); margin-top: var(--sp-2); text-align: center; display: none; }
.login-card .ok  { color: var(--success); font-size: var(--fs-sm); margin-top: var(--sp-2); text-align: center; display: none; }
.login-card .forgot-link { display: block; text-align: center; margin-top: var(--sp-4); font-size: var(--fs-sm); color: var(--text-muted); cursor: pointer; }
.login-card .forgot-link:hover { color: var(--text-secondary); text-decoration: underline; }
.panel { display: none; }
</style>
</head>
<body>
<div class="card login-card">
  <div class="brand-row">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <div>
      <h1>財務分析ツール</h1>
      <div class="sub">個人用 · 限定アクセス</div>
    </div>
  </div>

  <div id="login-panel">
    <label for="pw">パスワード</label>
    <input type="password" id="pw" placeholder="パスワードを入力" autocomplete="current-password">
    <button class="btn btn-primary" id="login-btn">ログイン</button>
    <div class="err" id="err">パスワードが違います</div>
    <span class="forgot-link" id="link-forgot">パスワードを忘れた場合</span>
  </div>

  <div id="reset-panel" class="panel">
    <label for="rk">回復キー（APP_RECOVERY_KEY）</label>
    <input type="password" id="rk" placeholder="回復キーを入力" autocomplete="off">
    <label for="np">新しいパスワード（8文字以上）</label>
    <input type="password" id="np" placeholder="新しいパスワードを入力" autocomplete="new-password">
    <button class="btn btn-primary" id="reset-btn">パスワードをリセット</button>
    <div class="err" id="reset-err"></div>
    <div class="ok"  id="reset-ok">パスワードを更新しました。ログインしてください。</div>
    <button class="btn btn-secondary" id="link-back">← ログインに戻る</button>
  </div>
</div>

<script type="module">
import './../static/js/core.js';

const _nextRaw = new URLSearchParams(location.search).get('next') || '/';
const _next = /^\/[^/\\]/.test(_nextRaw) || _nextRaw === '/' ? _nextRaw : '/';
if (localStorage.getItem('auth_token')) location.href = _next;

const $ = (id) => document.getElementById(id);

function showReset() {
  $('login-panel').style.display = 'none';
  $('reset-panel').style.display = 'block';
  $('rk').focus();
}
function showLogin() {
  $('reset-panel').style.display = 'none';
  $('login-panel').style.display = 'block';
  $('pw').focus();
}

async function login() {
  const pw = $('pw').value;
  const err = $('err');
  const btn = $('login-btn');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'ログイン中...';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (!r.ok) {
      err.textContent = 'パスワードが違います';
      err.style.display = 'block';
      $('pw').focus();
      return;
    }
    const d = await r.json();
    localStorage.setItem('auth_token', d.token);
    location.href = _next;
  } catch (e) {
    err.textContent = 'エラー: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'ログイン';
  }
}

async function resetPassword() {
  const rk = $('rk').value;
  const np = $('np').value;
  const err = $('reset-err');
  const ok = $('reset-ok');
  const btn = $('reset-btn');
  err.style.display = 'none';
  ok.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '更新中...';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recovery_key: rk, new_password: np })
    });
    const d = await r.json();
    if (!r.ok) {
      err.textContent = d.detail || 'エラーが発生しました';
      err.style.display = 'block';
      return;
    }
    ok.style.display = 'block';
    $('rk').value = ''; $('np').value = '';
    setTimeout(showLogin, 2000);
  } catch (e) {
    err.textContent = 'エラー: ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'パスワードをリセット';
  }
}

$('login-btn').addEventListener('click', login);
$('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
$('link-forgot').addEventListener('click', showReset);
$('reset-btn').addEventListener('click', resetPassword);
$('rk').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('np').focus(); });
$('np').addEventListener('keydown', (e) => { if (e.key === 'Enter') resetPassword(); });
$('link-back').addEventListener('click', showLogin);
</script>
</body>
</html>
