name: "[一回性] 週次株価バックフィル（Yahoo Finance / #198）"

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'stock_price_weekly を過去何年まで延伸するか（デフォルト 5）'
        required: false
        default: '5'

# 目的:
#   use_momentum=ON（macro_risk_return §9.8）の walk-forward CV は 52週先リターン＋
#   12ヶ月モメンタムを同時に要求するため、週次株価の被覆が短いと CV が 0 フォルドになる。
#   stock_price_weekly の最古日が today-years より新しい（過去不足）社について、
#   不足期間を Yahoo Finance から取得し record_prices_batch 経由で daily→weekly 再集約する。
#
#   ストレージ安全性: 1社処理ごとに daily を trim するため Supabase Free 500MB を超えない
#   （weekly は古い daily から再集約済みで情報損失なし）。
#
# 実行タイミング:
#   - use_momentum=ON を常用したくなったとき（既定は OFF のため通常は不要）に1回
#
# 検証（実行後）:
#   SELECT min(trade_date) FROM stock_price_weekly;  -- today-years 近傍まで遡っていること
#   use_momentum=true で /api/plugins/macro_risk_return/run の cv_metrics.n_folds >= 2

jobs:
  backfill-weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly history backfill
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python _pipeline_gh.py --backfill-weekly --backfill-weekly-years "${{ inputs.years }}"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-weekly-log
          path: pipeline_gh.log
          retention-days: 7
