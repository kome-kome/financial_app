name: "[定常] DBメンテナンス（VACUUM FULL・週次）"

# JST 日曜 04:00 = UTC 土曜 19:00（daily-incremental の JST 03:00 とはずらす）
#
# stock_price_daily は日次収集のたびに DELETE ベースの trim を行い、
# btree インデックスが bloat し続ける（Issue #290）。VACUUM FULL で
# 定期的に物理サイズを頭打ちにする。
#
# ✅ 段階導入完了（2026-07-12）: workflow_dispatch でローカル・GitHub Actions
# （Azure IP）双方から Supabase pooler 経由の VACUUM FULL 正常完了を確認済み
# （所要 8〜9秒・対象は stock_price_daily のみ・データ変更なし）。定時自動実行を有効化。

on:
  schedule:
    - cron: '0 19 * * 6'   # UTC 19:00 (土) = JST 04:00 (日)
  workflow_dispatch:

# 最小権限（GITHUB_TOKEN でリポジトリ書込は不要・収集/保守は Supabase 直結）
permissions:
  contents: read

jobs:
  vacuum:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VACUUM FULL maintenance
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _pipeline_vacuum.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vacuum-log
          path: logs/pipeline_vacuum.log
          retention-days: 30
