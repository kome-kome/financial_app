name: "[定常] M-1/M-2/M-3 ハイパーパラメータ月次自動探索"

# hyperparameter_search.py（Issue #264/#278/#291）を GitHub Actions で月次自動実行し、
# M-1(macro_risk_return)/M-2(macro_gbdt)/M-3(macro_dlm) の best params を
# plugin_tuned_params へ永続化するワークフロー（Issue #292）。
# ローカル専用 CLI では探索コスト（特に macro_gbdt のランダムサーチ）が重すぎるため、
# macro-beta-inference.yml と同じ「Render では動かせない重いバッチを Actions 上で実行し
# 本番 Supabase へ直接永続化する」パターンを踏襲する。
#
# matrix で3モデルに分けた理由: 各モデルで探索戦略（grid/random）・所要時間が大きく異なり、
# 1ジョブに直列で詰めると macro_gbdt 単体の重さが他モデルの再実行コストまで道連れにする
# （fail-fast のデフォルトも無効化し、1モデルの失敗が他モデルの正常完了を妨げないようにする）。
# 独立ジョブに分けることで、モデルごとに適切な timeout-minutes を設定でき、
# GitHub Actions の同時実行枠（無料アカウントの並列ジョブ上限）も有効活用できる。
#
# なぜ macro_gbdt だけ --strategy random --n-iter 150 か:
# ハイパーパラメータ探索の事前調査（ローカル実測）で、macro_gbdt は1イテレーションあたりの
# walk-forward OOF 評価コストが高く、n_iter=200 相当で 4〜8時間かかることが判明した。
# GitHub Actions ホスト型ランナーのジョブ実行時間ハード上限は6時間のため、
# 上限に収まるよう安全側に n_iter=150 へ抑えている（macro_risk_return/macro_dlm は
# grid 探索で空間が小さく、実測 10〜60分程度に収まるためこの制約を受けない）。
#
# macro_risk_return/macro_dlm の timeout-minutes について: 当初「ローカル実測10〜60分」
# を根拠に timeout-minutes=90 としていたが、この実測はローカル8コア環境のものであり、
# GitHub Actions ホスト型ランナーは実質2コア程度（macro-beta-inference.yml の既存コメント
# にも同様の指摘あり）のため所要時間が想定より伸びる。2026-07-09 の初回 workflow_dispatch
# 実行で実際に両ジョブとも timeout-minutes=90 に達し cancelled となったため、240 へ
# 引き上げた（macro_gbdt の355分ほどの余裕は不要だが、90分の2.5倍以上の安全マージンを確保）。
#
# 240→300への再引き上げ（Issue #304/#307）: #298/#299/#304 のキャッシュ・スコアリング
# 省略・numpyベクトル化を経ても、288候補フルグリッド（macro_risk_return/macro_dlm）の
# 粗い外挿で約254分と timeout-minutes=240 をわずかに超過するリスクが残った。統計的な
# 評価方法論（Walk-Forward CV のフォールド数削減等）には手を付けず、単純な安全マージン
# 拡大で対応する（254分に対し300分で約46分の余裕）。
#
# 品質ゲート（Issue #291）: --persist 時、plugin_tuned_params に既存行があれば
# objective_value を比較し、劣化していれば persist をスキップして非ゼロ終了する
# （hyperparameter_search.py の SystemExit）。これは意図した挙動であり、
# ジョブを failed 扱いにして GitHub 標準の失敗通知を飛ばすため continue-on-error 等で
# 握りつぶさない。
#
# cron 時刻: UTC 03:00（JST 12:00）を毎月1日に実行。daily-incremental.yml の
# UTC 18:00（JST 03:00、最大6時間枠＝UTC 18:00〜24:00 まで専有しうる）と重ならない
# 時間帯を選んでいる。

on:
  schedule:
    - cron: '0 3 1 * *'   # UTC 03:00 = JST 12:00、毎月1日
  workflow_dispatch:

jobs:
  tune:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 1モデルの品質ゲート失敗が他モデルの正常完了を妨げないようにする
      matrix:
        include:
          - model: macro_risk_return
            strategy: grid
            extra_args: ""
            timeout_minutes: 300   # #304後の推定254分に対し安全マージン確保（Issue #307）
          - model: macro_gbdt
            strategy: random
            extra_args: "--n-iter 150"
            timeout_minutes: 355   # 6時間(360分)上限ギリギリを避けるため355分
          - model: macro_dlm
            strategy: grid
            extra_args: ""
            timeout_minutes: 300   # #304後の推定254分に対し安全マージン確保（Issue #307）
    timeout-minutes: ${{ matrix.timeout_minutes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run hyperparameter search (model=${{ matrix.model }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python hyperparameter_search.py \
            --model ${{ matrix.model }} \
            --strategy ${{ matrix.strategy }} \
            ${{ matrix.extra_args }} \
            --objective rank_ic \
            --persist \
            --persist-scores \
            --seed 0 \
            2>&1 | tee hyperparameter_search_${{ matrix.model }}.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tune-hyperparameters-log-${{ matrix.model }}
          path: hyperparameter_search_${{ matrix.model }}.log
          retention-days: 30
