name: "[補完] CF NULL バックフィル（投資CF・capex 等）"

# 実行ポリシー: 手動（workflow_dispatch）のみ。定期 cron は持たない（Issue #117 で案B承認）。
#   理由（本番DB 20,548行の実態計測にもとづく判断）:
#     - 主要3区分（営業/投資/財務CF）は初回 XBRL 収集で ≧99.7% 充足しており、
#       「CF NULL が蓄積し続ける」懸念は実態として発生していない。
#     - 唯一の有意な欠損は capex（~11%）だが全年度で安定した構造的欠損であり、
#       同じ XBRL を再パースする日次 cron では改善しない（改善は parse 側のラベル照合課題）。
#     - よって定期 cron の便益はほぼ無く、J-Quants レート制限・Render スリープのコストのみ残るため廃止。
#   必要時は workflow_dispatch で mode（refill/capex-only/diagnose）・件数を指定して即時実行する。

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        type: choice
        required: true
        default: 'refill'
        options:
          - refill          # 通常補完（投資CF/現金増減/capex）
          - capex-only      # capex のみ補完（補完済みレコードの設備投資を一度だけ）
          - diagnose        # 診断モード（サンプルの CF ラベルを出力。本補完しない）
      limit:
        description: '補完件数の上限（refill/capex-only 用。診断時は無視）'
        required: false
        default: '6000'
      diagnose_limit:
        description: '診断モードのサンプル件数（diagnose 時のみ使用）'
        required: false
        default: '20'

jobs:
  refill-cf:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 6000件 × (~1.5s 取得 + 0.5s sleep) ≈ 3.3h。余裕を持って 330 分

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run (mode=${{ inputs.mode }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          MODE="${{ inputs.mode }}"
          LIMIT="${{ inputs.limit }}"
          DIAG_LIMIT="${{ inputs.diagnose_limit }}"
          echo "MODE=$MODE LIMIT=$LIMIT"
          if [ "$MODE" = "diagnose" ]; then
            python _pipeline_gh.py --diagnose-cf --diagnose-cf-limit "$DIAG_LIMIT"
          elif [ "$MODE" = "capex-only" ]; then
            python _pipeline_gh.py --refill-cf --refill-capex-only --refill-cf-limit "$LIMIT"
          else
            python _pipeline_gh.py --refill-cf --refill-cf-limit "$LIMIT"
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refill-cf-log
          path: pipeline_gh.log
          retention-days: 7
