name: "[定常] 差分収集・毎日自動実行"

# JST 03:00 = UTC 18:00
# 差分収集（過去1年・skip_existing）＋成長率/Zスコア＋市場データ＋マクロデータ
# Render 側には自動収集を持たせない設計。定時自動収集はこのワークフローが担う。

on:
  # ⚠️ schedule（毎日 cron）は段階的に無効化中。
  # 2026-05-26 に全件収集との同時実行回避で .disabled 化 → dual-table 移行(2026-06-06)後、
  # 本ワークフローは一度も新スキーマ下で走っていない。さらに J-Quants 無料は直近12週を
  # 配信しないため、鮮度は Phase 4 の Yahoo ギャップ補完（fill_recent_stock_price_gap_yahoo）
  # に依存する。Yahoo が GitHub Actions の IP から到達できるか未実証のため、
  # まず workflow_dispatch で手動1回流して株価が当日付近まで前進することを確認し、
  # 確認後に下記 schedule のコメントを外して定時自動収集を再開する。
  schedule:
    - cron: '0 18 * * *'   # UTC 18:00 = JST 03:00
  workflow_dispatch:

jobs:
  incremental:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 初回 Yahoo backfill（~12週分）のため一時的に延長。定常時は120分で十分。

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: python _pipeline_incremental.py

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incremental-log
          path: pipeline_incremental.log
          retention-days: 7
