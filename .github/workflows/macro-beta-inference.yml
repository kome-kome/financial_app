name: "[補完] M-1 per-stock 階層マクロ・ベータ推論バッチ"

# ADR-0002「M-1 を per-stock 階層マクロ・ベータへ再設計」の推論バッチ（macro_beta_inference.py）。
# 全体→セクター→銘柄の二層フルベイズ階層モデル（PyMC・NUTS）を GitHub Actions 上で実行し、
# 結果（per-stock 事後ローディング・SE・選択因子集合・因子共分散）を macro_beta_loadings /
# macro_beta_meta へ永続化する。M-1 プラグイン（macro_risk_return）は producer としてこれを読む。
#
# MCMC は /api/plugins/{name}/run の同期リクエストでは回せない（Render タイムアウト）ため
# バッチ分離（ADR-0002「実行アーキ＝推論バッチ分離」）。本番 Render の requirements.txt には
# PyMC を載せず、本ワークフロー専用の requirements-inference.txt でのみ導入する。
#
# 実行頻度: 手動（workflow_dispatch）のみ。マクロ環境・銘柄構成の変化に応じて随時再実行する
# 想定で、日次/週次の定期実行は今のところ設けない（初回実行の収束・所要時間の実績を見て検討）。
#
# サンプラーバックエンド: 診断計測（2026-07-02）の結果、PyMC 純 Python バックエンドは
# 本番規模（n_stock≈3800）で実測 75秒/draw と GitHub Actions のジョブ時間上限（6時間）に
# 収まらないことが判明したため、nuts_sampler="numpyro"（JAX/XLA JIT・実測 10.5〜11.2秒/draw・
# 約7倍高速）を既定にした。numpyro の既定初期化は発散多発（同一設定で乱数シードのみ違うと
# 1/100〜91/100 divergence の両極端が出た）ため init="adapt_diag" を必須で併用する。
# chains は 2 固定（ubuntu-latest ランナーの実コア数）。chains=4 を実測したところ、
# 2コアに4 virtual device を載せた結果 CPU/メモリを使い切りランナー自体がクラッシュした
# （"hosted runner lost communication with the server"・run 28696715446・ログすら残らず失敗）。
# 無料枠のランナーでは chains を増やす方向は選択肢にならない。
#
# それでも収束保証はできないため、persist は macro_beta_inference.py 側で
# r_hat_max<1.01（ADR-0002 検証基準）をゲートし、未達なら DB へ書き込まず失敗する
# （producer の macro_risk_return には品質ゲートが無く persist 即ライブ反映されるため）。
# 実測では chains=2・draws=800/1000 のどちらも r_hat_max=1.02 で頭打ち（PyMC 自身が
# 「r_hat の信頼できる計算には4 chain以上推奨」と警告する通り、2 chain では基準がやや
# 保守的に出ている可能性がある）。人手でその結果を採用する場合は force 入力を true にする。

on:
  workflow_dispatch:
    inputs:
      draws:
        description: "NUTS 事後サンプル数（チェーンあたり）"
        required: false
        default: "800"
      tune:
        description: "NUTS チューニングステップ数"
        required: false
        default: "800"
      target_accept:
        description: "NUTS target_accept（発散が多い場合は 0.97 等へさらに引き上げ）"
        required: false
        default: "0.95"
      chains:
        description: "チェーン数（既定2固定を推奨。4は2コアランナーでリソース枯渇しクラッシュ実測済み・要大容量ランナー）"
        required: false
        default: "2"
      force:
        description: "収束基準未達（r_hat_max>=1.01）でも persist する（true/false）。人手で結果を精査した上でのみ true にする"
        required: false
        default: "false"

# 最小権限（GITHUB_TOKEN でリポジトリ書込は不要・収集/保守は Supabase 直結）
permissions:
  contents: read

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies (requirements.txt + PyMC + numpyro)
        run: pip install -r requirements-inference.txt

      - name: Run inference batch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python macro_beta_inference.py \
            --draws "${{ github.event.inputs.draws || '800' }}" \
            --tune "${{ github.event.inputs.tune || '800' }}" \
            --target-accept "${{ github.event.inputs.target_accept || '0.95' }}" \
            --chains "${{ github.event.inputs.chains || '2' }}" \
            --nuts-sampler numpyro \
            --init adapt_diag \
            $FORCE_FLAG \
            2>&1 | tee macro_beta_inference.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-beta-inference-log
          path: macro_beta_inference.log
          retention-days: 30
