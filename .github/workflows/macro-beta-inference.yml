name: "[補完] M-1 per-stock 階層マクロ・ベータ推論バッチ"

# ADR-0002「M-1 を per-stock 階層マクロ・ベータへ再設計」の推論バッチ（macro_beta_inference.py）。
# 全体→セクター→銘柄の二層フルベイズ階層モデル（PyMC・NUTS）を GitHub Actions 上で実行し、
# 結果（per-stock 事後ローディング・SE・選択因子集合・因子共分散）を macro_beta_loadings /
# macro_beta_meta へ永続化する。M-1 プラグイン（macro_risk_return）は producer としてこれを読む。
#
# MCMC は /api/plugins/{name}/run の同期リクエストでは回せない（Render タイムアウト）ため
# バッチ分離（ADR-0002「実行アーキ＝推論バッチ分離」）。本番 Render の requirements.txt には
# PyMC を載せず、本ワークフロー専用の requirements-inference.txt でのみ導入する。
#
# 実行頻度: 月次 cron（毎月1日 UTC 11:00＝JST 20:00）＋手動（workflow_dispatch）。
# 当初は「初回実行の収束・所要時間の実績を見て検討」のため定期実行を設けず随時再実行する
# 想定だったが、実運用では再学習が人力任せで鮮度が担保されなかった（Issue #341／最終成功
# 2026-07-04 から次の再実行まで12日以上放置された実例）。半期(H1)財務基盤(#219)・週次株価
# chunked 化(#311)等のデータ追加も未反映のまま滞留していたため、tune-hyperparameters.yml
# （月次 cron・毎月1日）に倣い月次定期実行を追加する。マクロ環境・銘柄構成の変化を月1回
# 反映すれば producer の鮮度としては十分（M-1 は長期のマクロ・ベータ推定で日次更新の必要が
# ない）。臨時の再実行が必要なときは従来通り workflow_dispatch で手動起動できる。
#
# cron 時刻の選定: 340分（最大 5.7時間）走りうるため、同じく毎月1日に走る
# tune-hyperparameters.yml（UTC 03:00〜最大 09:00）と daily-incremental.yml
# （毎日 UTC 18:00〜最大 24:00）のどちらとも重ならない UTC 11:00 を選ぶ
# （11:00＋5.7h＝16:40 で 18:00 の日次差分開始前に収まる）。
#
# サンプラーバックエンド: 診断計測（2026-07-02）の結果、PyMC 純 Python バックエンドは
# 本番規模（n_stock≈3800）で実測 75秒/draw と GitHub Actions のジョブ時間上限（6時間）に
# 収まらないことが判明したため、nuts_sampler="numpyro"（JAX/XLA JIT・実測 10.5〜11.2秒/draw・
# 約7倍高速）を既定にした。numpyro の既定初期化は発散多発（同一設定で乱数シードのみ違うと
# 1/100〜91/100 divergence の両極端が出た）ため init="adapt_diag" を必須で併用する。
# chains は 2 固定（ubuntu-latest ランナーの実コア数）。chains=4 を実測したところ、
# 2コアに4 virtual device を載せた結果 CPU/メモリを使い切りランナー自体がクラッシュした
# （"hosted runner lost communication with the server"・run 28696715446・ログすら残らず失敗）。
# 無料枠のランナーでは chains を増やす方向は選択肢にならない。
#
# それでも収束保証はできないため、persist は macro_beta_inference.py 側で r_hat_max を
# ゲートし、閾値超過なら DB へ書き込まず失敗する（producer の macro_risk_return には品質
# ゲートが無く persist 即ライブ反映されるため）。実測では chains=2・draws=800/1000 の
# どちらも r_hat_max=1.02 で頭打ち（PyMC 自身が「r_hat の信頼できる計算には4 chain以上
# 推奨」と警告する通り、2 chain では基準がやや保守的に出ている＝実 persist 済みの
# 2026-07-04 run も r_hat_max=1.02・n_divergences=0 だった）。ADR-0002 の strict 基準
# （<1.01）のままだと chains=2 の cron は毎回このゲートで落ちて永遠に persist されないため、
# ゲート閾値を --r-hat-threshold で可変化し（既定 1.01）、月次 cron では 1.05 を渡して
# 構造的な ~1.02 は自動 persist しつつ、真に収束していない run（r_hat が 1.05 を大きく
# 超過）は依然 reject する（Issue #341）。閾値を緩めても足りない例外運用のときだけ、人手で
# 結果を精査した上で force 入力を true にする。

on:
  schedule:
    - cron: '0 11 1 * *'   # UTC 11:00 = JST 20:00、毎月1日（tune-hyperparameters/daily-incremental と非重複）
  workflow_dispatch:
    inputs:
      draws:
        description: "NUTS 事後サンプル数（チェーンあたり）"
        required: false
        default: "800"
      tune:
        description: "NUTS チューニングステップ数"
        required: false
        default: "800"
      target_accept:
        description: "NUTS target_accept（発散が多い場合は 0.97 等へさらに引き上げ）"
        required: false
        default: "0.95"
      chains:
        description: "チェーン数（既定2固定を推奨。4は2コアランナーでリソース枯渇しクラッシュ実測済み・要大容量ランナー）"
        required: false
        default: "2"
      r_hat_threshold:
        description: "persist を許可する r_hat_max の上限。既定 1.05＝chains=2 で構造的に頭打ちする ~1.02 を自動 persist しつつ、真の未収束（r_hat が大きく超過）は reject する（Issue #341）。ADR-0002 strict 基準で運用したい場合は 1.01 を指定"
        required: false
        default: "1.05"
      force:
        description: "r_hat_threshold 未達でも persist する（true/false）。人手で結果を精査した上でのみ true にする（threshold を緩めても足りない例外運用）"
        required: false
        default: "false"

# 最小権限（GITHUB_TOKEN でリポジトリ書込は不要・収集/保守は Supabase 直結）
permissions:
  contents: read

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies (requirements.txt + PyMC + numpyro)
        run: pip install -r requirements-inference.txt

      - name: Run inference batch
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then FORCE_FLAG="--force"; fi
          python macro_beta_inference.py \
            --draws "${{ github.event.inputs.draws || '800' }}" \
            --tune "${{ github.event.inputs.tune || '800' }}" \
            --target-accept "${{ github.event.inputs.target_accept || '0.95' }}" \
            --chains "${{ github.event.inputs.chains || '2' }}" \
            --r-hat-threshold "${{ github.event.inputs.r_hat_threshold || '1.05' }}" \
            --nuts-sampler numpyro \
            --init adapt_diag \
            $FORCE_FLAG \
            2>&1 | tee macro_beta_inference.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-beta-inference-log
          path: macro_beta_inference.log
          retention-days: 30
