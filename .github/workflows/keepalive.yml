name: Keepalive ping (Render Free spindown 対策)

# GitHub Actions の cron は UTC 基準で評価される。本プロジェクトの自動収集
# スケジューラ (api.py:_daily_scheduler) は JST 3 時に動くため、本ワークフローは
# JST 表記でいうと「scheduler が走る 3 時前後」と「業務時間 (9-23 JST)」だけ
# /health を叩く設計。これにより:
#   - 深夜の自動収集を確実に起こせる (3 時前後で 5 回 ping)
#   - 業務時間中はコールドスタートを回避できる (30 分間隔)
#   - Render Free の 750h/月 無料枠に余裕を持って収まる (~470h/月)

on:
  schedule:
    # JST 2:50, 2:55 (UTC 17:50, 17:55) — scheduler 直前にスピンアップ
    - cron: '50,55 17 * * *'
    # JST 3:00, 3:05, 3:10 (UTC 18:00, 18:05, 18:10) — scheduler 実行中の追い ping
    - cron: '0,5,10 18 * * *'
    # JST 9:00-23:30 (UTC 0:00-14:30) — 業務時間中は 30 分間隔
    - cron: '*/30 0-14 * * *'
  workflow_dispatch:  # 手動実行可能

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        run: |
          URL="${PING_URL:-https://financial-app.onrender.com/health}"
          echo "Pinging $URL"
          # コールドスタートを考慮して接続/応答に長めの猶予を取る
          # -f: HTTP エラー時に exit 1 / -s: 静音 / -S: エラーは表示
          # --max-time 60: コールドスタート分の最大待ち時間
          response=$(curl -fsS --max-time 60 -w "\n%{http_code}\n" "$URL")
          status=$?
          echo "$response"
          if [ $status -ne 0 ]; then
            echo "::warning::ping failed (exit $status). Render が起動中の可能性があるため次回試行で回復見込み"
            exit 0  # 失敗でもワークフロー自体は成功扱い (一時的な失敗で通知を飛ばさない)
          fi
        env:
          PING_URL: ${{ vars.PING_URL }}
