name: "[補完] マクロのみ収集"

# MACRO_SERIES（為替・金利・指数・コモディティ・ボラ）を Yahoo Finance から収集して
# macro_data に upsert する軽量ワークフロー。full-pipeline / daily-incremental から
# マクロ収集だけを切り出した検証・補完用。
#
# 用途:
#   - 新規系列追加時（例 #218 の VIX/DXY/US5Y/US30Y）の Actions（Azure IP）到達性・蓄積実証
#   - macro_data の鮮度補完
# Yahoo は GitHub Actions の Azure IP から到達できる（stooq は 403 ブロックのためフォールバック不可）。

on:
  workflow_dispatch:
    inputs:
      years:
        description: "遡及年数（zscore 用に既定5年）"
        required: false
        default: "5"

# 最小権限（GITHUB_TOKEN でリポジトリ書込は不要・収集/保守は Supabase 直結）
permissions:
  contents: read

jobs:
  collect-macro:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect macro data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
        run: |
          python collector.py --macro --years "${{ github.event.inputs.years || '5' }}" 2>&1 | tee macro_collect.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macro-collect-log
          path: macro_collect.log
          retention-days: 7
