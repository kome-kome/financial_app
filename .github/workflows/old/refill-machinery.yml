name: "[補完] bs_machinery NULL バックフィル（MachineryAndVehiclesNet タグ追加後）"

# 一回性バックフィル:
#   MachineryAndVehiclesNet タグを database.py bs_machinery 列に追加後、
#   bs_ppe_total があるのに bs_machinery が NULL のレコードを古い順に XBRL 再取得して是正する。
#   完了後（remaining≒機械装置を持たない金融・サービス等の正当 NULL のみ）はスケジュール不要。
# 手動起動:
#   workflow_dispatch で limit（省略時は全件）を指定して即時実行。

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '補完件数の上限（省略＝全件・約4〜5時間。分割実行したい場合のみ指定）'
        required: false
        default: ''

jobs:
  refill-machinery:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 全件 ~9800件 × (~1.5s 取得 + 0.6s sleep) ≈ 5.2h。余裕を持って 350 分

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.7'  # render.yaml の PYTHON_VERSION と一致させる
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refill-machinery (limit=${{ inputs.limit }})
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: |
          LIMIT="${{ inputs.limit }}"
          if [ -n "$LIMIT" ]; then
            echo "LIMIT=$LIMIT"
            python _pipeline_gh.py --refill-machinery --refill-machinery-limit "$LIMIT"
          else
            echo "LIMIT=(none / all)"
            python _pipeline_gh.py --refill-machinery
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refill-machinery-log
          path: pipeline_gh.log
          retention-days: 7
